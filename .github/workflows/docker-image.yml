name: Docker Compose CI + Push to GHCR

on:
  push:
    branches:
      - Lab-7
  pull_request:
    branches:
      - Lab-7

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker images
        run: docker compose build

      - name: Tag Docker images with branch name
        run: |
          IMAGE_TAG="ghcr.io/your-username/your-repo/java-app:${GITHUB_REF##*/}"
          echo "Tagging image with branch name: $IMAGE_TAG"
          docker tag java_app $IMAGE_TAG
          docker tag java_DB $IMAGE_TAG

      - name: Push Docker images to GHCR
        run: |
          IMAGE_TAG="ghcr.io/your-username/your-repo/java-app:${GITHUB_REF##*/}"
          docker push $IMAGE_TAG
          docker push ghcr.io/your-username/your-repo/java-db:${GITHUB_REF##*/}

      - name: Stop containers
        run: docker compose down